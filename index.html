<!DOCTYPE html>
<html>
<head>
  <title>Site Script Inliner</title>
  <style>
    body { font-family: Arial; padding: 40px; background:#0f172a; color:white; }
    input, button { padding:10px; font-size:16px; }
    input { width:60%; }
    button { background:#22c55e; border:none; cursor:pointer; }
    textarea { width:100%; height:400px; margin-top:20px; }
  </style>
</head>
<body>

<h1>🌐 Website Script Inliner</h1>

<input id="url" placeholder="Enter website URL..." />
<button onclick="process()">Inline Scripts</button>

<textarea id="output" placeholder="Result HTML will appear here..."></textarea>

<script>
async function process() {
    const url = document.getElementById("url").value;

    const res = await fetch("https://website-inliner.onrender.com/inline", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
    });

    const data = await res.json();
    document.getElementById("output").value = data.html || data.error;
}
</script>
