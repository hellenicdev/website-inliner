<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Inliner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0b1120; color: #e2e8f0; min-height: 100vh;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
    h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 4px;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 24px; margin-bottom: 16px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .url-row { display: flex; gap: 8px; }
    .url-row input {
      flex: 1; padding: 12px 16px; font-size: 15px; border-radius: 8px;
      border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
      outline: none; transition: border-color 0.2s;
    }
    .url-row input:focus { border-color: #22c55e; }
    .url-row input::placeholder { color: #475569; }
    .btn {
      padding: 12px 24px; font-size: 15px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
      background: #22c55e; color: #052e16; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: #16a34a; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #22c55e; color: #052e16; }
    .btn-secondary {
      background: transparent; border: 1px solid #334155; color: #94a3b8;
    }
    .btn-secondary:hover { border-color: #22c55e; color: #22c55e; }
    .toggles { display: flex; gap: 24px; }
    .toggle {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      user-select: none; font-size: 14px; color: #cbd5e1;
    }
    .toggle input { display: none; }
    .toggle-slider {
      width: 40px; height: 22px; background: #334155; border-radius: 11px;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-slider::after {
      content: ""; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; background: #e2e8f0; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #22c55e; }
    .toggle input:checked + .toggle-slider::after { transform: translateX(18px); }
    .output-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .output-stats { font-size: 13px; color: #64748b; }
    .output-actions { display: flex; gap: 8px; }
    textarea {
      width: 100%; min-height: 320px; padding: 16px; font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
      font-size: 13px; line-height: 1.5; border-radius: 8px;
      border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
      resize: vertical; outline: none;
    }
    textarea:focus { border-color: #06b6d4; }
    .status {
      display: none; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px;
    }
    .status.visible { display: flex; }
    .status.loading { background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd; }
    .status.error { background: #3b1c1c; border: 1px solid #dc2626; color: #fca5a5; }
    .status.success { background: #1a3a2a; border: 1px solid #16a34a; color: #86efac; }
    .spinner {
      width: 18px; height: 18px; border: 2px solid transparent;
      border-top-color: #93c5fd; border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid #334155; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; color: #e2e8f0;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.visible { opacity: 1; }
    footer {
      position: fixed; bottom: 0; left: 0; width: 100%;
      text-align: center; font-size: 13px; color: #475569;
      background: #0b1120; border-top: 1px solid #1e293b;
      padding: 12px; z-index: 10;
    }
    @media (max-width: 600px) {
      .container { padding: 24px 16px 80px; }
      .url-row { flex-direction: column; }
      .toggles { flex-direction: column; gap: 12px; }
      .output-header { flex-direction: column; gap: 8px; align-items: flex-start; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Website Inliner</h1>
    <p class="subtitle">Fetch a page, inline all its external scripts and stylesheets into a single HTML file.</p>

    <div class="card">
      <div class="card-title">Target URL</div>
      <div class="url-row">
        <input id="url" type="url" placeholder="https://example.com" autofocus spellcheck="false" />
        <button class="btn" id="goBtn" onclick="process()">Inline</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Options</div>
      <div class="toggles">
        <label class="toggle">
          <input type="checkbox" id="inlineScripts" checked />
          <span class="toggle-slider"></span>
          Inline Scripts
        </label>
        <label class="toggle">
          <input type="checkbox" id="inlineStyles" checked />
          <span class="toggle-slider"></span>
          Inline Stylesheets
        </label>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="card" style="padding-bottom: 16px;">
      <div class="output-header">
        <span class="card-title" style="margin-bottom: 0;">Output</span>
        <div class="output-actions">
          <span class="output-stats" id="stats"></span>
          <button class="btn btn-secondary" id="copyBtn" onclick="copyOutput()" style="padding: 6px 14px; font-size: 13px;">Copy</button>
        </div>
      </div>
      <textarea id="output" placeholder="Inlined HTML will appear here..." readonly></textarea>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <footer>&copy; 2026 HellenicDev &mdash; All projects and content belong to HellenicDev.</footer>

  <script>
    const API_URL = "https://website-inliner.onrender.com/inline";

    async function process() {
      const url = document.getElementById("url").value.trim();
      const goBtn = document.getElementById("goBtn");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      const stats = document.getElementById("stats");

      if (!url) {
        showToast("Please enter a URL");
        return;
      }

      goBtn.disabled = true;
      output.value = "";
      stats.textContent = "";
      document.getElementById("copyBtn").textContent = "Copy";

      showStatus("loading", `Fetching and processing <strong>${escapeHtml(url)}</strong>...`);

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url,
            scripts: document.getElementById("inlineScripts").checked,
            styles: document.getElementById("inlineStyles").checked,
          }),
        });

        const data = await res.json();

        if (data.error) {
          showStatus("error", data.error);
          return;
        }

        output.value = data.html;
        showStatus("success", `Done &mdash; ${(new Blob([data.html]).size / 1024).toFixed(1)} KB of inlined HTML`);
        stats.textContent = `${data.html.length.toLocaleString()} chars · ${(new Blob([data.html]).size / 1024).toFixed(1)} KB`;
      } catch (err) {
        showStatus("error", `Request failed: ${err.message}`);
      } finally {
        goBtn.disabled = false;
      }
    }

    async function copyOutput() {
      const output = document.getElementById("output");
      if (!output.value) return;
      try {
        await navigator.clipboard.writeText(output.value);
        document.getElementById("copyBtn").textContent = "Copied!";
        setTimeout(() => {
          document.getElementById("copyBtn").textContent = "Copy";
        }, 2000);
      } catch {
        showToast("Failed to copy");
      }
    }

    function showStatus(type, message) {
      const el = document.getElementById("status");
      el.className = "status visible " + type;
      if (type === "loading") {
        el.innerHTML = `<div class="spinner"></div> ${message}`;
      } else {
        el.innerHTML = message;
      }
    }

    function showToast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("visible");
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove("visible"), 2500);
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    document.getElementById("url").addEventListener("keydown", (e) => {
      if (e.key === "Enter") process();
    });
  </script>
</body>
</html>
